<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
    <title>Přihlášení | 3.VOM</title>
    <link rel="icon" type="image/png" href="../assets/image/logo/3VOM-logo.png" />

    <!-- Your main CSS file -->
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <div id="header"></div>

    <script src="../assets/JS/i18n.js"></script>
    <script src="../src/components/header.js"></script>
    <script>
        renderHeader("login");
    </script>

    <!-- =========================
        LOGIN SECTION
   ========================= -->
    <main class="login-wrap">
        <div class="login-card">

            <h2>Enter Login</h2>
            <p class="login-desc">
                This page is protected. Please enter your
                username and password to continue.
            </p>

            <form class="join-form" id="loginForm"
                autocomplete="off">

                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username"
                        type="text"
                        placeholder="username" required />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password"
                        type="password"
                        placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn primary">
                    Continue
                </button>

                <div id="errorBox" class="login-error">
                    Wrong username or password. Try again.
                </div>

                <div class="login-hint">
                    Press Enter to submit.
                </div>

            </form>

        </div>
    </main>

    <div id="footer"></div>
    <script src="../src/components/footer.js"></script>
    <script>
        renderFooter();
    </script>

    <!-- =========================
        SCRIPT
   ========================= -->
    <script src="../assets/JS/login.js" defer></script>

</body>

</html>
