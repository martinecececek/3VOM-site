<!doctype html>
<html lang="cs">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <title>Galerie | 3.VOM</title>

      <!-- MAIN STYLES -->
      <link rel="stylesheet" href="../css/styles.css" />

      <!-- ✅ correct icon path from /pages/gallery.html -->
      <link rel="icon" type="image/png" href="../assets/image/logo/3VOM-logo.png" />
   </head>

   <body>
      <!-- HEADER -->
      <div id="header"></div>

      <!-- ✅ Load header and call renderHeader -->
      <script type="module">
         import "../src/components/header.js";
         // If header.js attaches renderHeader to window, this will work:
         window.renderHeader?.("gallery");
      </script>

      <!-- MAIN -->
      <main class="container">
         <!-- PAGE INTRO -->
         <section class="page-hero">
            <h2>Galerie</h2>
            <p class="page-hero-text">
               Výběr momentů z našich kurzů, výletů a komunitních akcí.
            </p>
         </section>

         <!-- FEATURED STRIP -->
         <section class="gallery-feature">
            <div class="gallery-feature-card">
               <div class="gallery-feature-text">
                  <h3>Vybrané momenty</h3>
                  <p>
                     Od klidných jezer po říční dobrodružství – nahlédněte do
                     atmosféry našeho oddílu.
                  </p>
               </div>

               <div class="gallery-feature-grid">
                  <img
                     src="../assets/image/gallery-nahled/20240329_121304.jpg"
                     alt="Vybraný snímek 1"
                  />
                  <img
                     src="../assets/image/gallery-nahled/20231028_135350.jpg"
                     alt="Vybraný snímek 2"
                  />
                  <img
                     src="../assets/image/gallery-nahled/img-bezky.jpeg"
                     alt="Vybraný snímek 3"
                  />
               </div>
            </div>
         </section>

         <!-- MAIN GRID (DYNAMIC FROM JSON) -->
         <section class="gallery-grid-wrap">
            <h3>VŠECHNY FOTOGRAFIE</h3>

            <!-- JS renders figures here -->
            <div id="galleryGrid" class="gallery-grid"></div>
         </section>

         <a href="https://wodacy.rajce.idnes.cz/" class="btn primary bring-btn">
            Zobrazit více fotek
         </a>
      </main>

      <!-- FOOTER -->
      <div id="footer"></div>

      <!-- ✅ Load footer and call renderFooter -->
      <script type="module">
         import "../src/components/footer.js";
         window.renderFooter?.();
      </script>

      <!-- LIGHTBOX HTML (must exist BEFORE lightbox.js) -->
      <div id="lightbox" class="lightbox" aria-hidden="true">
         <div class="lightbox__backdrop" data-lb-close></div>

         <figure class="lightbox__content" role="dialog" aria-modal="true">
            <button
               class="lightbox__close"
               type="button"
               aria-label="Zavřít"
               data-lb-close
            >
               ×
            </button>

            <button
               class="lightbox__nav lightbox__nav--prev"
               type="button"
               aria-label="Předchozí"
               data-lb-prev
            >
               <svg class="lightbox__icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                     d="M15 18l-6-6 6-6"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2.5"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                  />
               </svg>
            </button>

            <div class="lightbox__image-frame">
               <img id="lightboxImg" class="lightbox__img" alt="" />
            </div>
            <figcaption id="lightboxCaption" class="lightbox__caption"></figcaption>

            <button
               class="lightbox__nav lightbox__nav--next"
               type="button"
               aria-label="Další"
               data-lb-next
            >
               <svg class="lightbox__icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                     d="M9 6l6 6-6 6"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2.5"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                  />
               </svg>
            </button>
         </figure>
      </div>

      <!-- ✅ SCRIPTS (module required if gallery.js uses import.meta.url) -->
      <script type="module" src="../assets/JS/gallery.js"></script>
      <script type="module" src="../assets/JS/lightbox.js"></script>
   </body>
</html>
