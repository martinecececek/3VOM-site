<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Borrowed Items</title>
      <link rel="stylesheet" href="styles.css" />
   </head>
   <body>
      <div id="header"></div>

      <script src="./components/header.js"></script>
      <script>
         renderHeader("null");
      </script>

      <div class="borrow-card">
         <h3>Borrowed Items</h3>
         <p class="borrow-help">
            Each member has a header, with borrowed items listed below.
         </p>

         <div class="borrow-table-wrap">
            <table class="borrow-table">
               <thead>
                  <tr>
                     <th>Category</th>
                     <th>Description</th>
                     <th>Item Number</th>
                     <th style="width: 180px">Borrowed Date</th>
                  </tr>
               </thead>

               <tbody id="borrowTableBody">
                  <!-- JS WILL INSERT DATA HERE -->
               </tbody>
            </table>
         </div>
      </div>

      <script src="./JS/borrow.js"></script>

      <!-- FOOTER -->
      <div id="footer"></div>
      <script src="./components/footer.js"></script>
      <script>
         renderFooter();
      </script>
   </body>
</html>
