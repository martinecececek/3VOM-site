<!doctype html>
<html lang="cs">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Admin | 3. Vodácký oddíl mládeže</title>
      <link rel="stylesheet" href="../styles.css" />
      <meta name="robots" content="noindex, nofollow" />
   </head>
   <body>
      <script>
         if (!sessionStorage.getItem("ADMIN_KEY")) {
            window.location.replace("login.html");
         }
      </script>
      <main class="container">
         <section class="page-hero">
            <h2>Admin</h2>
            <p class="page-hero-text">Nahrání fotky a souboru pro web.</p>
         </section>

         <section class="admin-grid">
            <!-- PHOTO UPLOAD -->
            <div class="admin-card">
               <h3>Nahrát fotku</h3>
               <p class="admin-help">Podporované formáty: JPG, PNG, WebP.</p>

               <form
                  class="admin-form"
                  id="uploadForm"
                  enctype="multipart/form-data"
               >
                  <div class="field">
                     <label for="photoTitle">Název / popisek</label>
                     <input
                        id="photoTitle"
                        name="photoTitle"
                        type="text"
                        placeholder="Např. Trénink – květen 2026"
                     />
                  </div>

                  <div class="upload-box">
                     <label class="upload-label" for="photoFile">
                        Vybrat fotku
                        <span class="upload-sub">Klikni pro výběr souboru</span>
                     </label>
                     <input
                        id="photoFile"
                        name="photoFile"
                        type="file"
                        accept="image/*"
                     />
                  </div>

                  <button class="btn primary" type="submit" id="uploadBtn">
                     Uložit
                  </button>
                  <p
                     class="admin-note"
                     id="uploadStatus"
                     aria-live="polite"
                  ></p>
               </form>
            </div>

            <script src="./JS/send-img.js"></script>

            <!-- FILE UPLOAD -->
            <div class="admin-card">
               <h3>Nahrát soubor</h3>
               <p class="admin-help">Např. PDF nebo jiný dokument.</p>

               <form
                  class="admin-form"
                  id="pdfForm"
                  enctype="multipart/form-data"
               >
                  <div class="upload-box">
                     <label class="upload-label" for="anyFile">
                        Vybrat soubor (program.pdf)
                        <span class="upload-sub">Klikni pro výběr PDF</span>
                     </label>
                     <input
                        id="anyFile"
                        name="anyFile"
                        type="file"
                        accept="application/pdf"
                     />
                  </div>

                  <button class="btn primary" type="submit" id="pdfBtn">
                     Uložit
                  </button>
                  <p class="admin-note" id="pdfStatus" aria-live="polite"></p>
               </form>
            </div>

            <script src="./JS/send-file.js"></script>
         </section>
      </main>
   </body>
</html>
