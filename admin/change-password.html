<!doctype html>
<html lang="cs">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Změna hesla | 3. Vodácký oddíl mládeže</title>
      <link rel="stylesheet" href="../css/fff.css" />
      <meta name="robots" content="noindex, nofollow" />
   </head>
   <body>
      <script>
         if (!sessionStorage.getItem("ADMIN_KEY")) {
            window.location.replace("login.html");
         }
      </script>
      <main class="container">
         <section class="page-hero">
            <h2>Admin - Změna hesla</h2>
            <p class="page-hero-text">Změna hesla uživatele.</p>
         </section>

         <section class="admin-grid">
            <div class="admin-card">
               <h3>Změnit heslo</h3>
               <p class="admin-help">Vyberte uživatele a zadejte nové heslo.</p>

               <form class="admin-form" id="changePasswordForm" autocomplete="off">
                  <div class="field">
                     <label for="userSelect">Uživatel</label>
                     <select id="userSelect" required>
                        <option value="">Načítám...</option>
                     </select>
                  </div>

                  <div class="field">
                     <label for="newPassword">Nové heslo</label>
                     <input
                        id="newPassword"
                        type="text"
                        placeholder="Zadejte nové heslo"
                        required
                        autocomplete="off"
                     />
                  </div>

                  <button class="btn primary" type="submit" id="submitBtn">
                     Změnit heslo
                  </button>
                  <p class="admin-note" id="status" aria-live="polite"></p>
               </form>

               <div style="margin-top: 2rem; text-align: center;">
                  <a href="index.html" class="btn secondary">Zpět na admin</a>
               </div>
            </div>
         </section>
      </main>

      <script>
         (() => {
            const WORKER_URL = "https://change-password.martin-jakubuv.workers.dev";
            const ADMIN_KEY = sessionStorage.getItem("ADMIN_KEY");

            // Works on both localhost and GitHub Pages
            // Page is at /admin/change-password.html, user.json is at /src/data/user.json
            const USERS_JSON_PATH = "../src/data/user.json";

            const select = document.getElementById("userSelect");
            const form = document.getElementById("changePasswordForm");
            const newPassInput = document.getElementById("newPassword");
            const submitBtn = document.getElementById("submitBtn");
            const statusEl = document.getElementById("status");

            // Load users for the dropdown
            async function loadUsers() {
               try {
                  const res = await fetch(USERS_JSON_PATH, { cache: "no-store" });
                  if (!res.ok) throw new Error(`HTTP ${res.status}`);
                  const data = await res.json();

                  select.innerHTML = '<option value="">Vyberte uživatele</option>';
                  (data.users || []).forEach((u) => {
                     const opt = document.createElement("option");
                     opt.value = u.personId;
                     opt.textContent = `${u.username} (ID: ${u.personId})`;
                     select.appendChild(opt);
                  });
               } catch (err) {
                  select.innerHTML = '<option value="">Chyba načítání</option>';
                  console.error("Failed to load users:", err);
               }
            }

            loadUsers();

            form.addEventListener("submit", async (e) => {
               e.preventDefault();

               const personId = select.value;
               const newPassword = newPassInput.value.trim();

               if (!personId) {
                  statusEl.textContent = "Vyberte uživatele.";
                  return;
               }
               if (!newPassword) {
                  statusEl.textContent = "Zadejte nové heslo.";
                  return;
               }

               submitBtn.disabled = true;
               statusEl.textContent = "Měním heslo…";

               try {
                  const res = await fetch(WORKER_URL, {
                     method: "POST",
                     headers: {
                        "Content-Type": "application/json",
                        "x-admin-key": ADMIN_KEY,
                     },
                     body: JSON.stringify({
                        personId: Number(personId),
                        newPassword: newPassword,
                     }),
                  });

                  if (!res.ok) {
                     const text = await res.text();
                     statusEl.textContent = `Chyba (${res.status}): ${text}`;
                     return;
                  }

                  const data = await res.json();
                  if (data.ok) {
                     statusEl.textContent = `Heslo úspěšně změněno pro uživatele ${data.username}.`;
                     newPassInput.value = "";
                  } else {
                     statusEl.textContent = `Chyba: ${data.error || "Neznámá chyba"}`;
                  }
               } catch (err) {
                  statusEl.textContent = `Chyba: ${err.message}`;
               } finally {
                  submitBtn.disabled = false;
               }
            });
         })();
      </script>
   </body>
</html>
