<!doctype html>
<html lang="en">
   <head>

      <title>Půjčené položky (Admin)</title>
      <link rel="stylesheet" href="../css/styles.css" />
      <meta name="robots" content="noindex, nofollow" />
   </head>
   <body>
      <script>
         if (!sessionStorage.getItem("ADMIN_KEY")) {
            window.location.replace("login.html");
         }
      </script>
      <div class="borrow-card">
         <h3>Borrowed Items (Admin)</h3>
         <p class="borrow-help">Admin view – manage borrowed items.</p>

         <div class="borrow-table-wrap">
            <table class="borrow-table">
               <thead>
                  <tr>
                     <th>Category</th>
                     <th>Description</th>
                     <th>Item Number</th>
                     <th style="width: 180px">Borrowed Date</th>
                     <th style="width: 140px">Admin</th>
                     <!-- NEW COLUMN -->
                  </tr>
               </thead>

               <tbody id="borrowAdminBody">
                  <!-- JS WILL INSERT CONTENT -->
               </tbody>
            </table>
         </div>
      </div>

      <script src="JS/load-borrow-admin.js"></script>
      <script src="JS/add-item.js"></script>
      <script src="JS/remove-item.js"></script>
   </body>
</html>
