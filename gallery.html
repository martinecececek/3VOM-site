<!doctype html>
<html lang="cs">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Galerie | 3.VOM</title>
      <link rel="stylesheet" href="styles.css" />
      <link rel="icon" type="image/png" href="./images/logo/3VOM-logo.png" />
   </head>

   <body>
      <div id="header"></div>

      <script src="./components/header.js"></script>
      <script>
         renderHeader("gallery");
      </script>

      <main class="container">
         <!-- PAGE INTRO -->
         <section class="page-hero">
            <h2>Galerie</h2>
            <p class="page-hero-text">
               Výběr momentů z našich kurzů, výletů a komunitních akcí.
            </p>
         </section>

         <!-- FEATURED STRIP -->
         <section class="gallery-feature">
            <div class="gallery-feature-card">
               <div class="gallery-feature-text">
                  <h3>Vybrané momenty</h3>
                  <p>
                     Od klidných jezer po říční dobrodružství – nahlédněte do
                     atmosféry našeho oddílu.
                  </p>
               </div>

               <div class="gallery-feature-grid">
                  <img
                     src="./images/Gallery-nahled/20240329_121304.jpg"
                     alt="Vybraný snímek 1"
                  />
                  <img
                     src="./images/Gallery-nahled/20231028_135350.jpg"
                     alt="Vybraný snímek 2"
                  />
                  <img
                     src="https://placehold.co/900x600"
                     alt="Vybraný snímek 3"
                  />
               </div>
            </div>
         </section>

         <!-- MAIN GRID -->
         <section class="gallery-grid-wrap">
            <h3>VŠECHNY FOTOGRAFIE</h3>

            <div class="gallery-grid">
               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 1"
                  />
                  <figcaption>Kurz pro začátečníky</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 2"
                  />
                  <figcaption>Pádlování při západu slunce</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 3"
                  />
                  <figcaption>Říční turistika</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 4"
                  />
                  <figcaption>Týmový trénink</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 5"
                  />
                  <figcaption>Den vybavení</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 6"
                  />
                  <figcaption>Komunitní setkání</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 7"
                  />
                  <figcaption>Ráno u jezera</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 8"
                  />
                  <figcaption>Highlights z výletu</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 9"
                  />
                  <figcaption>Příprava na závod</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 10"
                  />
                  <figcaption>Na vodě</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 11"
                  />
                  <figcaption>Výhled do přírody</figcaption>
               </figure>

               <figure class="gallery-item">
                  <img
                     src="https://placehold.co/800x650"
                     alt="Fotka z galerie 12"
                  />
                  <figcaption>Víkendový výlet</figcaption>
               </figure>
            </div>
         </section>

         <a href="https://wodacy.rajce.idnes.cz/" class="btn primary bring-btn">
            Zobrazit více fotek
         </a>
      </main>

      <!-- FOOTER -->
      <div id="footer"></div>
      <script src="./components/footer.js"></script>
      <script>
         renderFooter();
      </script>
   </body>
</html>
